services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: birdseye
      POSTGRES_PASSWORD: birdseye
      POSTGRES_DB: birdseye
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U birdseye -d birdseye']
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://birdseye:birdseye@db:5432/birdseye
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-BirdsEye <onboarding@resend.dev>}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-50M}
    ports:
      - '3000:3000'

volumes:
  db-data:
